name: Deploy backend-migration to ECS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'deploy/Dockerfile'
      - 'deploy/entrypoint.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: backend-migration-api
  ECR_REGISTRY: 239460481239.dkr.ecr.us-east-1.amazonaws.com
  CLUSTER: mcp-agents-staging-cluster
  SERVICE: backend-migration-api-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://mcp-agents-staging-alb-249976027.us-east-1.elb.amazonaws.com:5012/health
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239460481239:role/github-actions-rorr-mcp
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region $AWS_REGION > /dev/null

      - name: Done
        run: |
          echo "✅ Deployment triggered: $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}"
          echo "Health: http://mcp-agents-staging-alb-249976027.us-east-1.elb.amazonaws.com:5012/health"
          echo "API Docs: http://mcp-agents-staging-alb-249976027.us-east-1.elb.amazonaws.com:5012/api-docs"
          echo "ℹ️  새 task가 unhealthy하면 ECS가 옛 task로 자동 롤백/유지 — 별도 wait 검증 없음."
