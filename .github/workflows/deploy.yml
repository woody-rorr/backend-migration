name: Deploy backend-migration to ECS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'deploy/Dockerfile'
      - 'deploy/entrypoint.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: backend-migration-api
  ECR_REGISTRY: 239460481239.dkr.ecr.us-east-1.amazonaws.com
  CLUSTER: mcp-agents-staging-cluster
  SERVICE: backend-migration-api-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://mcp-agents-staging-alb-249976027.us-east-1.elb.amazonaws.com:5012/health
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239460481239:role/github-actions-rorr-mcp
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region $AWS_REGION > /dev/null

      - name: Wait for service stable
        timeout-minutes: 10
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE \
            --region $AWS_REGION

      - name: Verify new image is running
        run: |
          EXPECTED="$ECR_REGISTRY/$ECR_REPO:${{ github.sha }}"
          TASK_ARN=$(aws ecs list-tasks --cluster $CLUSTER --service-name $SERVICE \
            --desired-status RUNNING --region $AWS_REGION --query 'taskArns[0]' --output text)
          RUNNING_IMAGE=$(aws ecs describe-tasks --cluster $CLUSTER --tasks "$TASK_ARN" \
            --region $AWS_REGION --query 'tasks[0].containers[0].image' --output text)
          echo "Expected (sha tag): $EXPECTED"
          echo "Running:            $RUNNING_IMAGE"
          # task definition uses :latest, so running image will be :latest — just confirm digest matches
          DIGEST_EXPECTED=$(aws ecr describe-images --repository-name $ECR_REPO --region $AWS_REGION \
            --image-ids imageTag=${{ github.sha }} --query 'imageDetails[0].imageDigest' --output text)
          DIGEST_RUNNING=$(aws ecs describe-tasks --cluster $CLUSTER --tasks "$TASK_ARN" \
            --region $AWS_REGION --query 'tasks[0].containers[0].imageDigest' --output text)
          echo "Expected digest: $DIGEST_EXPECTED"
          echo "Running digest:  $DIGEST_RUNNING"
          if [ "$DIGEST_EXPECTED" != "$DIGEST_RUNNING" ]; then
            echo "::error::Running task is not using the newly pushed image"
            exit 1
          fi
          echo "✅ Verified: running image matches commit ${{ github.sha }}"

      - name: Done
        run: |
          echo "✅ Deployment complete: $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}"
          echo "Health: http://mcp-agents-staging-alb-249976027.us-east-1.elb.amazonaws.com:5012/health"
          echo "API Docs: http://mcp-agents-staging-alb-249976027.us-east-1.elb.amazonaws.com:5012/api-docs"
